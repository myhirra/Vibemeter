server {
    listen 80;
    listen [::]:80;
    server_name vibemeter.siney.top;

    root /home/nginx-deploy/vibemeter.siney.top-static;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /home/nginx-deploy/vibemeter.siney.top-static;
        try_files $uri =404;
    }

    location = /install.sh {
        default_type text/plain;
        add_header Cache-Control "no-store";
        try_files /install.sh =404;
    }

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
