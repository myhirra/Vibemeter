server {
    listen 80;
    listen [::]:80;
    server_name vibemeter.siney.top;

    root /home/nginx-deploy/vibemeter.siney.top-static;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /home/nginx-deploy/vibemeter.siney.top-static;
        try_files $uri =404;
    }

    location = /install.sh {
        default_type text/plain;
        add_header Cache-Control "no-store";
        try_files /install.sh =404;
    }

    # Anonymous client telemetry — proxied to the admin node service (9561),
    # which validates + stores the daily heartbeat. Everything else falls
    # through to the static handlers below.
    location = /v1/telemetry {
        proxy_pass http://127.0.0.1:9561;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
